stages:
  split:
    cmd: python src/data/prepare.py
    deps:
    - data/raw_data/raw.csv
    - src/data/prepare.py
    outs:
    - data/processed/X_test.csv
    - data/processed/X_train.csv
    - data/processed/y_test.csv
    - data/processed/y_train.csv
  normalize:
    cmd: python src/data/normalize.py
    deps:
    - data/processed/X_test.csv
    - data/processed/X_train.csv
    - src/data/normalize.py
    outs:
    - data/processed/X_test_scaled.csv
    - data/processed/X_train_scaled.csv
    - models/scaler.joblib
  gridsearch:
    cmd: python src/models/gridsearch.py --config params.yaml
    deps:
    - params.yaml
    - data/processed/X_train_scaled.csv
    - data/processed/y_train.csv
    - src/models/gridsearch.py
    - src/models/registry.py
    outs:
    - metrics/lightgbm_results.csv
    - models/lightgbm-best-params.pkl
  evaluate:
    cmd: python src/models/evaluate.py --model_path models/lightgbm.pkl 
      --X_test_path data/processed/X_test_scaled.csv --y_test_path 
      data/processed/y_test.csv
    deps:
    - data/processed/X_test_scaled.csv
    - data/processed/y_test.csv
    - models/lightgbm.pkl
    - src/models/evaluate.py
    outs:
    - data/predictions.csv
    metrics:
    - metrics/scores.json:
        cache: false
  training:
    cmd: python src/models/train.py --config params.yaml 
      --params models/lightgbm-best-params.pkl --X_train_path 
      data/processed/X_train_scaled.csv --y_train_path 
      data/processed/y_train.csv
    deps:
    - params.yaml
    - data/processed/X_train_scaled.csv
    - data/processed/y_train.csv
    - models/lightgbm-best-params.pkl
    - src/models/registry.py
    - src/models/train.py
    outs:
    - models/lightgbm.pkl
